<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio E-Commerce</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .section { padding: 60px 0; }
        .social-icon-btn { padding: 6px 12px; font-size: 0.85rem; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
        <a class="navbar-brand" href="#home">MyStore</a>
        <div class="navbar-nav">
            <a class="nav-link" href="#products">Products</a>
            <a class="nav-link" href="#login">Login</a>
            <a class="nav-link" href="#register">Register</a>
            <a class="nav-link" href="#cart">Cart</a>
        </div>
    </div>
</nav>

<section id="products" class="section">
    <div class="container">
        <h2 class="mb-4">Our Products</h2>
        <div class="row">
            <div class="col-md-4">
                <div class="card mb-4">
                    <div class="card-body">
                        <h5 class="card-title">Project Item #1</h5>
                        <p class="card-text">$50.00</p>
                        <button class="btn btn-primary">Add to Cart</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<section id="login" class="section bg-light">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <h3>Login</h3>
                <form>
                    <div class="mb-3"><input type="email" class="form-control" placeholder="Email"></div>
                    <div class="mb-3"><input type="password" class="form-control" placeholder="Password"></div>
                    <button type="submit" class="btn btn-success">Login</button>
                </form>
            </div>
        </div>
    </div>
</section>

<section id="register" class="section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <h3>Register</h3>
                <form>
                    <div class="mb-3"><input type="text" class="form-control" placeholder="Full Name"></div>
                    <div class="mb-3"><input type="email" class="form-control" placeholder="Email"></div>
                    <div class="mb-3"><input type="password" class="form-control" placeholder="Password"></div>
                    <button type="submit" class="btn btn-primary">Sign Up</button>
                </form>
            </div>
        </div>
    </div>
</section>

<section id="cart" class="section bg-light">
    <div class="container">
        <h3>Shopping Cart</h3>
        <p><em>(Cart functionality will be enabled after successful login)</em></p>
        <table class="table">
            <thead><tr><th>Item</th><th>Price</th></tr></thead>
            <tbody><tr><td>Sample Product</td><td>$50.00</td></tr></tbody>
        </table>
    </div>
</section>

<footer class="bg-dark text-white py-4">
    <div class="container text-center">
        <div class="social-icons-modern">
            <a href="#" class="social-icon-btn text-white"><i class="fab fa-facebook-f"></i> <span>Facebook</span></a>
            <a href="#" class="social-icon-btn text-white"><i class="fab fa-instagram"></i> <span>Instagram</span></a>
            <a href="#" class="social-icon-btn text-white"><i class="fab fa-whatsapp"></i> <span>WhatsApp</span></a>
        </div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
